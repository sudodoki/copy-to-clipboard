name: Github-based Browser Tests

on:
  push:
    branches:
      - main
      - 4.0.0-branch
  pull_request:
    branches:
      - main
      - 4.0.0-branch

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build dist
        run: npm run build
      - name: Check package exports (publint)
        run: npm run check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Chrome: installed on ubuntu-latest; chromedriver comes from devDependencies.
      # Chrome requires --headless and --no-sandbox in CI.
      # Firefox: pre-installed on ubuntu-latest; geckodriver from devDependencies.
      # The firefox env auto-enables headless mode when CI=true.
      - name: Run Nightwatch tests (${{ matrix.browser }})
        run: npm run test:${{ matrix.browser }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightwatch-reports-${{ matrix.browser }}
          path: reports/
          retention-days: 7
