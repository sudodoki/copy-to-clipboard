<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CopyButtonPlayground</title>
  <link rel="stylesheet" href="example.css">
</head>
<body>
  <h1 data-test="heading"><a href="http://github.com/sudodoki/copy-to-clipboard">copy-to-clipboard Repo</a></h1>
  <textarea data-test="placeholder"></textarea>
  <div data-test="rich-placeholder" contenteditable="true" style="min-height:2em;border:1px solid #ccc;padding:4px;margin:4px 0;"></div>
  <div class="container">
    <h2 id="basic-text">Basic text copy</h2>
    <textarea disabled class="code half">copyToClipboard("Hello, I'm new content from your clipboard")</textarea>
    <div class="half">
      <button data-test="init-basic-text">Click to copy sample text</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="multiline-text">Multiline text copy</h2>
    <textarea disabled class="code half">
This would be
some multiline text
for us to copy</textarea>
    <div class="half">
      <button data-test="init-multiline-text">Click to copy multiline text</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="multiline-markup">Markup + text copy</h2>
    <textarea disabled class="code half">
<script>
  alert('this is some script')
</script>
</textarea>
    <div class="half">
      <button data-test="init-markup-text">Click to copy multiline text</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="rich-text">Rich text (HTML) copy</h2>
    <textarea disabled class="code half">copyToClipboard('&lt;b&gt;Hello &lt;i&gt;world&lt;/i&gt;&lt;/b&gt;', { format: 'text/html' })</textarea>
    <div class="half">
      <button data-test="init-rich-text">Click to copy rich text</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="rich-text-custom-plain">Rich text with custom plain fallback</h2>
    <textarea disabled class="code half">copyToClipboard('&lt;b&gt;Hello &lt;i&gt;world&lt;/i&gt;&lt;/b&gt;', {
  format: 'text/html',
  onCopy: () =&gt; new ClipboardItem({
    'text/html': new Blob(['&lt;b&gt;Hello &lt;i&gt;world&lt;/i&gt;&lt;/b&gt;'], { type: 'text/html' }),
    'text/plain': new Blob(['Hello plain world'], { type: 'text/plain' }),
  })
})</textarea>
    <div class="half">
      <button data-test="init-rich-text-custom-plain">Click to copy rich text with custom plain</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="tabbed-text">Tab-separated + CRLF text copy</h2>
    <textarea disabled class="code half">copyToClipboard("Dapibus\t1\r\nUltricies\t20\r\nInceptos\t444\r\n")</textarea>
    <div class="half">
      <button data-test="init-tabbed-text">Click to copy tab/CRLF text</button>
    </div>
  </div>
  <hr>
  <div class="container">
    <h2 id="dialog-copy">Copy inside modal dialog</h2>
    <textarea disabled class="code half">copyToClipboard("Hello from dialog")</textarea>
    <div class="half">
      <button data-test="open-modal-dialog">Open dialog and copy</button>
    </div>
  </div>
  <dialog data-test="modal-dialog">
    <p>This is a modal dialog.</p>
    <button data-test="copy-inside-dialog">Copy text from inside dialog</button>
    <button data-test="close-dialog">Close</button>
  </dialog>
  <hr>
  <div class="container">
    <h2 id="fullscreen-copy">Copy inside fullscreen element</h2>
    <textarea disabled class="code half">// execCommand fails in fullscreen; navigator.clipboard works
copyToClipboard("Hello from fullscreen")</textarea>
    <div class="half">
      <button data-test="open-fullscreen">Enter fullscreen and copy</button>
    </div>
  </div>
  <div data-test="fullscreen-container" style="display:none; position:fixed; inset:0; background:#1a1a2e; color:#fff; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:9999;">
    <p style="font-size:1.2em;">You are in fullscreen mode.</p>
    <button data-test="copy-inside-fullscreen">Copy text from inside fullscreen</button>
    <div data-test="fullscreen-result" style="font-size:0.9em; color:#aef;"></div>
    <button data-test="exit-fullscreen">Exit fullscreen</button>
  </div>
  <hr>
  <script src="./index.js"></script>
  <script>
    document.querySelector('#basic-text ~ .half button')
      .addEventListener('click', async function () {
        await copyToClipboard("Hello, I'm new content from your clipboard");
      });
    (function() {
      var multilineContainer = document.querySelector('#multiline-text + textarea');
      document.querySelector('#multiline-text ~ .half button')
        .addEventListener('click', async function () {
          await copyToClipboard(multilineContainer.textContent);
        });
    })();
    (function() {
      var markupContainer = document.querySelector('#multiline-markup + textarea');
      document.querySelector('#multiline-markup ~ .half button')
        .addEventListener('click', async function () {
          await copyToClipboard(markupContainer.textContent);
        });
    })();
    document.querySelector('#rich-text ~ .half button')
      .addEventListener('click', async function () {
        await copyToClipboard('<b>Hello <i>world</i></b>', { format: 'text/html' });
      });
    document.querySelector('#rich-text-custom-plain ~ .half button')
      .addEventListener('click', async function () {
        await copyToClipboard('<b>Hello <i>world</i></b>', {
          format: 'text/html',
          onCopy: function() {
            return new ClipboardItem({
              'text/html': new Blob(['<b>Hello <i>world</i></b>'], { type: 'text/html' }),
              'text/plain': new Blob(['Hello plain world'], { type: 'text/plain' }),
            });
          },
        });
      });
    document.querySelector('#tabbed-text ~ .half button')
      .addEventListener('click', async function () {
        await copyToClipboard("Dapibus\t1\r\nUltricies\t20\r\nInceptos\t444\r\n");
      });
    (function() {
      var dialog = document.querySelector('[data-test="modal-dialog"]');
      document.querySelector('[data-test="open-modal-dialog"]')
        .addEventListener('click', function () {
          dialog.showModal();
        });
      document.querySelector('[data-test="copy-inside-dialog"]')
        .addEventListener('click', async function () {
          await copyToClipboard("Hello from dialog");
        });
      document.querySelector('[data-test="close-dialog"]')
        .addEventListener('click', function () {
          dialog.close();
        });
    })();
    (function() {
      var fsContainer = document.querySelector('[data-test="fullscreen-container"]');
      var fsResult = document.querySelector('[data-test="fullscreen-result"]');

      document.querySelector('[data-test="open-fullscreen"]')
        .addEventListener('click', function () {
          fsContainer.style.display = 'flex';
          fsContainer.requestFullscreen().catch(function(err) {
            fsResult.textContent = 'Fullscreen error: ' + err.message;
          });
        });

      document.querySelector('[data-test="copy-inside-fullscreen"]')
        .addEventListener('click', async function () {
          var ok = await copyToClipboard("Hello from fullscreen");
          fsResult.textContent = ok ? 'Copied! Paste to verify.' : 'Copy failed.';
        });

      document.querySelector('[data-test="exit-fullscreen"]')
        .addEventListener('click', function () {
          if (document.fullscreenElement) document.exitFullscreen();
          fsContainer.style.display = 'none';
          fsResult.textContent = '';
        });

      document.addEventListener('fullscreenchange', function () {
        if (!document.fullscreenElement) {
          fsContainer.style.display = 'none';
          fsResult.textContent = '';
        }
      });
    })();
  </script>
</body>
</html>
